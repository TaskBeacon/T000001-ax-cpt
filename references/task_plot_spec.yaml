task_plot_spec:
  spec_version: '0.2'
  meta:
    task_name: AX-CPT Task
    mode: existing
    task_id: ''
  figure:
    output:
      filename: task_flow.png
      dpi: 300
      width_in: 16.0
      background: white
    layout:
      max_conditions: 4
      screens_per_timeline: 6
      screen_overlap_ratio: 0.0
      screen_slope: 0.08
      screen_slope_deg: 25.0
      timeline_gap: 0.18
      screen_aspect_ratio: 1.4545454545454546
      left_margin: 0.2
      right_margin: 0.03
      top_margin: 0.03
      bottom_margin: 0.05
      condition_label_gap: 0.014
      phase_label_pad: 0.01
      duration_label_gap: 0.006
      timeline_arrow_gap: 0.01
      timeline_arrow_screen_clearance: 0.007
      timeline_arrow_text_clearance: 0.01
      timeline_arrow_extra_per_screen: 0.015
      timeline_arrow_min_y: 0.02
      timeline_arrow_max_y: 0.96
  timelines:
  - condition: AX
    display_condition_label: AX
    phases:
    - phase_name: pre cue fixation
      display_phase_label: Fixation
      duration_ms:
        fixed: 500
      response_window_ms: null
      display_timing_label: 500 ms
      stim_ids:
      - fixation
      stimulus_example:
        summary: +
        modality: visual
        draw_hint: text
        render_items:
        - kind: text
          text: +
          color: white
          pos: null
          height: 1.5
      notes: ''
    - phase_name: context cue
      display_phase_label: Cue
      duration_ms:
        fixed: 500
      response_window_ms: null
      display_timing_label: 500 ms
      stim_ids:
      - cue_A
      stimulus_example:
        summary: A / B
        modality: visual
        draw_hint: text
        render_items:
        - kind: text
          text: A / B
          color: white
          pos: null
          height: 1.5
      notes: ''
    - phase_name: delay fixation
      display_phase_label: Fixation
      duration_ms:
        fixed: 500
      response_window_ms: null
      display_timing_label: 500 ms
      stim_ids:
      - fixation
      stimulus_example:
        summary: +
        modality: visual
        draw_hint: text
        render_items:
        - kind: text
          text: +
          color: white
          pos: null
          height: 1.5
      notes: ''
    - phase_name: probe response
      display_phase_label: Probe
      duration_ms:
        fixed: 1000
      response_window_ms:
        fixed: 1000
      display_timing_label: 1000 ms
      stim_ids:
      - probe_X
      stimulus_example:
        summary: X / Y
        modality: visual
        draw_hint: text
        render_items:
        - kind: text
          text: X / Y
          color: white
          pos: null
          height: 1.5
      notes: ''
    - phase_name: feedback
      display_phase_label: Feedback
      duration_ms:
        fixed: 500
      response_window_ms: null
      display_timing_label: 500 ms
      stim_ids:
      - no_response_feedback
      stimulus_example:
        summary: 未反应
        modality: visual
        draw_hint: text
        render_items:
        - kind: text
          text: 未反应
          color: white
          pos: null
          height: 1.5
      notes: ''
    - phase_name: iti
      display_phase_label: ITI
      duration_ms:
        range:
        - 800
        - 1200
      response_window_ms: null
      display_timing_label: 800-1200 ms
      stim_ids:
      - blank_iti
      stimulus_example:
        summary: blank screen
        modality: visual
        draw_hint: text
        render_items:
        - kind: text
          text: ''
          color: white
      notes: ''
    condition_variants:
    - AY
    - BX
    - BY
    display_condition_note: 'Variants: AX, AY, BX, BY'
  legend: []
